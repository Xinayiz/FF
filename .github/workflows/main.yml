name: Build FF APK v1.0
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Download Xray AAR
        run: |
          mkdir -p app/libs
          wget -q -O app/libs/libxray.aar https://github.com/2dust/AndroidLibXrayLite/releases/download/v0.5.0/libxray.aar

      - name: Setup Gradle Wrapper
        run: |
          # Скачиваем официальный gradle-wrapper.jar
          mkdir -p gradle/wrapper
          wget -q -O gradle/wrapper/gradle-wrapper.jar https://repo1.maven.org/maven2/org/gradle/gradle-wrapper/8.2/gradle-wrapper-8.2.jar
          # Создаём gradlew и gradlew.bat
          cat > gradlew << 'EOF'
          #!/bin/sh
          if [ -z "$JAVA_HOME" ]; then
              JAVACMD="java"
          else
              JAVACMD="$JAVA_HOME/bin/java"
          fi
          DIRNAME=`dirname "$0"`
          APP_HOME=`cd "$DIRNAME" && pwd`
          CLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar
          exec "$JAVACMD" -cp "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"
          EOF
          chmod +x gradlew
          cat > gradlew.bat << 'EOF'
          @rem Gradle startup script for Windows
          @set DIRNAME=%~dp0
          @set APP_HOME=%DIRNAME%
          @set CLASSPATH=%APP_HOME%\gradle\wrapper\gradle-wrapper.jar
          @"%JAVA_HOME%\bin\java.exe" -cp "%CLASSPATH%" org.gradle.wrapper.GradleWrapperMain %*
          EOF

      - name: Build APK
        run: ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: FF-APK
          path: app/build/outputs/apk/debug/*.apk
