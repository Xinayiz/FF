name: Build FF APK v1.0
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          curl -L -o /tmp/cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip
          unzip -q /tmp/cmdline-tools.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Download libv2ray.aar
        env:
            GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p app/libs
          # Используем автоматический токен GitHub для скачивания
          gh release download v26.4.25 -R 2dust/AndroidLibXrayLite -p "libv2ray.aar" -O app/libs/libv2ray.aar
          ls -la app/libs/

      - name: Setup Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://repo1.maven.org/maven2/org/gradle/gradle-wrapper/8.2/gradle-wrapper-8.2.jar
          cat > gradlew << 'EOF'
          #!/bin/sh
          if [ -z "$JAVA_HOME" ]; then
              JAVACMD="java"
          else
              JAVACMD="$JAVA_HOME/bin/java"
          fi
          DIRNAME=`dirname "$0"`
          APP_HOME=`cd "$DIRNAME" && pwd`
          CLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar
          exec "$JAVACMD" -cp "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"
          EOF
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: FF-APK
          path: app/build/outputs/apk/debug/*.apk
